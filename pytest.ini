[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Strict markers to prevent typos and categorize test suites
markers =
    unit: marks tests as unit tests (fast, no external dependencies)
    integration: marks tests as integration tests (requires DB/Broker mocks or test instances)
    e2e: marks tests as end-to-end tests (simulates full user flows)
    slow: marks tests that take a long time to run

# Fail if coverage falls below expectations (configured in CI)
# addopts = --strict-markers -v
